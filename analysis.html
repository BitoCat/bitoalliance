<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>比特聯盟 · 幣種分析</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#edd4be;--card:#faf3ec;--border:#d4a882;
  --text:#3a2a1a;--text2:#7a5a3a;--accent:#c07840;--dark:#2a1a0a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',sans-serif;min-height:100vh;}

header{background:var(--dark);color:#edd4be;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:17px;font-weight:600;}
.sub{font-size:11px;color:#c8a87a;margin-bottom:2px;}

.main{padding:14px 16px;max-width:960px;margin:0 auto;}

/* 幣種選擇器 */
.sym-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.sym-bar label{font-size:12px;color:var(--text2);font-weight:500;}
.sym-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 12px;font-size:14px;font-weight:600;color:var(--text);width:150px;}
.sym-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;}
.sym-btn:hover{background:#a86030;}
.sym-btn:disabled{opacity:0.5;cursor:default;}
.quick-syms{display:flex;gap:6px;flex-wrap:wrap;}
.qs{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text2);}
.qs:hover,.qs.active{background:var(--dark);color:#edd4be;border-color:var(--dark);}

/* TradingView */
.tv-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.tv-header{background:var(--dark);color:#edd4be;padding:8px 14px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:space-between;}
.tv-tfs{display:flex;gap:6px;}
.tv-tf{background:transparent;border:1px solid #c8a87a44;color:#c8a87a;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;}
.tv-tf.active,.tv-tf:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
#tvChart{height:360px;}

/* 警語 */
.warning-box{background:#fffbe6;border:1.5px solid #f0c030;border-radius:10px;padding:14px 16px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;}
.warning-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.warning-text{font-size:14px;color:#7a5a10;line-height:1.6;}
.warning-text strong{font-size:15px;display:block;margin-bottom:4px;color:#5a3a00;}

/* 評分區 */
.score-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.score-layout{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center;}
.score-circle{width:88px;height:88px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.score-num{font-size:30px;font-weight:700;line-height:1;}
.score-dir{font-size:12px;margin-top:4px;font-weight:500;}
.score-breakdown{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.sb-item{background:var(--bg);border-radius:6px;padding:8px 6px;text-align:center;}
.sb-label{font-size:10px;color:var(--text2);margin-bottom:4px;}
.sb-val{font-size:14px;font-weight:600;}
.up{color:#1a5c2a;} .dn{color:#c04828;} .neu{color:#888780;}

/* 線別建議 */
.advice-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title span{font-size:10px;font-weight:400;color:var(--text2);}
.no-signal{background:var(--bg);border-radius:8px;padding:16px;text-align:center;color:var(--text2);font-size:14px;}
.signal-layout{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.signal-main{background:var(--bg);border-radius:8px;padding:14px;}
.signal-dir{font-size:22px;font-weight:700;margin-bottom:6px;}
.signal-type{font-size:16px;font-weight:600;margin-bottom:4px;}
.signal-hold{font-size:13px;color:var(--text2);}
.signal-warn{background:#fffbe6;border:1px solid #f0c030;border-radius:6px;padding:10px 12px;font-size:13px;color:#7a5a10;margin-top:10px;line-height:1.5;}
.signal-detail{display:flex;flex-direction:column;gap:8px;}
.res-active{background:#f0faf2;border:1px solid #2e8c42;border-radius:6px;padding:10px 12px;}
.res-missing{background:#fdf2f0;border:1px solid #e8a090;border-radius:6px;padding:10px 12px;}
.res-label{font-size:10px;font-weight:600;margin-bottom:6px;}
.res-tags{display:flex;gap:6px;flex-wrap:wrap;}
.res-tag{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:500;}
.tag-active{background:#1a5c2a;color:#d4f0dc;}
.tag-miss{background:#e8a090;color:#7a1a0a;}

/* 共振儀表板 */
.resonance-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.groups-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.group-card{border:0.5px solid var(--border);border-radius:8px;padding:10px 8px 8px;background:var(--bg);}
.group-card.long-res{border-color:#2e8c42;border-width:1.5px;background:#f0faf2;}
.group-card.short-res{border-color:#c04828;border-width:1.5px;background:#fdf2f0;}
.group-card.escort-res{border-color:#185fa5;border-width:1.5px;background:#eef4fc;}
.rb-escort{background:#e6f1fb;color:#185fa5;}
.group-label{font-size:11px;font-weight:600;color:var(--text2);text-align:center;margin-bottom:8px;}
.pillars{display:flex;gap:5px;justify-content:center;align-items:flex-end;height:100px;}
.pillar-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.pillar-dir{font-size:12px;height:16px;line-height:16px;font-weight:700;}
.pillar{width:26px;height:84px;border-radius:5px;position:relative;}
.pillar-line{position:absolute;left:-2px;right:-2px;height:3px;border-radius:2px;}
.pillar-name{font-size:9px;color:var(--text2);text-align:center;margin-top:2px;}
.group-badge{text-align:center;margin-top:6px;height:20px;display:flex;align-items:center;justify-content:center;}
.res-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.rb-long{background:#1a5c2a;color:#d4f0dc;}
.rb-short{background:#c04828;color:#fce8e4;}

/* 指標 */
.indicators-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.ind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.ind-tf-card{border:0.5px solid var(--border);border-radius:8px;padding:10px;background:var(--bg);}
.ind-tf-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;text-align:center;}
.ind-row{margin-bottom:8px;}
.ind-name{font-size:10px;color:var(--text2);margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.ind-bar-wrap{display:flex;align-items:center;gap:6px;}
.ind-bar{flex:1;height:14px;border-radius:4px;position:relative;}
.ind-marker{position:absolute;top:-1px;bottom:-1px;width:3px;border-radius:2px;background:var(--dark);}
.ind-val{font-size:11px;font-weight:600;min-width:36px;text-align:right;}
.ind-tag{font-size:9px;padding:1px 5px;border-radius:4px;}
.tag-os{background:#d4f0dc;color:#1a5c2a;}
.tag-ob{background:#fce8e4;color:#c04828;}
.tag-bull{background:#d4f0dc;color:#1a5c2a;}
.tag-bear{background:#fce8e4;color:#c04828;}
.tag-escort{background:#e6f1fb;color:#185fa5;}

/* 其他 */
.other-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.other-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.ocard{border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;background:var(--bg);}
.ocard-label{font-size:10px;color:var(--text2);margin-bottom:4px;}
.ocard-val{font-size:15px;font-weight:600;}
.ocard-sub{font-size:11px;color:var(--text2);margin-top:3px;}

.loading-overlay{text-align:center;padding:60px 20px;color:var(--text2);font-size:14px;}
.status-bar{font-size:11px;color:var(--text2);margin-top:8px;text-align:right;}
</style>
</head>
<body>
<header>
  <div>
    <div class="sub">比特聯盟 BitoAlliance</div>
    <h1>幣種深度分析</h1>
  </div>
  <div style="text-align:right">
    <div style="font-size:18px;font-weight:700" id="hdrPrice">—</div>
    <div style="font-size:12px" id="hdrChange">—</div>
  </div>
</header>

<div class="main">

  <!-- 幣種選擇器 -->
  <div class="sym-bar">
    <label>幣種</label>
    <input type="text" class="sym-input" id="symInput" value="BTCUSDT" onkeydown="if(event.key==='Enter')load()">
    <button class="sym-btn" id="loadBtn" onclick="load()">分析</button>
    <div class="quick-syms">
      <span class="qs active" onclick="quickSym('BTCUSDT',this)">BTC</span>
      <span class="qs" onclick="quickSym('ETHUSDT',this)">ETH</span>
      <span class="qs" onclick="quickSym('SOLUSDT',this)">SOL</span>
      <span class="qs" onclick="quickSym('BNBUSDT',this)">BNB</span>
      <span class="qs" onclick="quickSym('XRPUSDT',this)">XRP</span>
      <span class="qs" onclick="quickSym('DOGEUSDT',this)">DOGE</span>
    </div>
  </div>

  <!-- TradingView K線 -->
  <div class="tv-wrap">
    <div class="tv-header">
      <span id="tvSymLabel">BTCUSDT · K線</span>
      <div class="tv-tfs">
        <button class="tv-tf" onclick="setTVTF('5',this)">5m</button>
        <button class="tv-tf" onclick="setTVTF('15',this)">15m</button>
        <button class="tv-tf active" onclick="setTVTF('60',this)">1H</button>
        <button class="tv-tf" onclick="setTVTF('240',this)">4H</button>
        <button class="tv-tf" onclick="setTVTF('D',this)">日</button>
      </div>
    </div>
    <div id="tvChart"></div>
  </div>

  <!-- 警語 -->
  <div class="warning-box">
    <div class="warning-icon">⚠️</div>
    <div class="warning-text">
      <strong>重要聲明：本頁所有分析內容僅供參考，不構成任何投資建議</strong>
      數據模型基於技術指標運算，無法預測市場突發事件與黑天鵝風險。
      加密貨幣市場波動劇烈，請尊重市場充滿變化的特性，務必自行評估風險，理性控制倉位。
    </div>
  </div>

  <div id="content">
    <div class="loading-overlay">輸入幣種後點「分析」開始載入</div>
  </div>

  <div class="status-bar" id="statusBar"></div>
</div>

<script>
const BITO_API  = 'https://web-production-f4735.up.railway.app';
const SUPA_URL  = 'https://kldumnxdlgovaxtiszyn.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsZHVtbnhkbGdvdmF4dGlzenluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMjIyNDgsImV4cCI6MjA5MzY5ODI0OH0.P_anfYpSV2tgCPIQ7uZDVBjUFY3UhfEXk9u3XjlzBHI';
const sb = supabase.createClient(SUPA_URL, SUPA_ANON);
let currentSym = 'BTCUSDT', tvTF = '60';

function loadTV(symbol, tf) {
  document.getElementById('tvChart').innerHTML = '';
  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/tv.js';
  s.onload = () => new TradingView.widget({
    container_id:'tvChart', symbol:`BITUNIX:${symbol}`,
    interval:tf, theme:'light', style:'1', locale:'zh_TW',
    toolbar_bg:'#faf3ec', enable_publishing:false,
    hide_top_toolbar:false, save_image:false, height:360, width:'100%',
  });
  document.head.appendChild(s);
}
function setTVTF(tf, el) {
  tvTF = tf;
  document.querySelectorAll('.tv-tf').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadTV(currentSym, tf);
}
function quickSym(sym, el) {
  document.querySelectorAll('.qs').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('symInput').value = sym;
  currentSym = sym; load();
}

function posColor(pos) {
  if(pos < 0.2)  return '#1a5c2a';
  if(pos < 0.35) return '#2e8c42';
  if(pos < 0.45) return '#7dc48a';
  if(pos < 0.55) return '#888780';
  if(pos < 0.65) return '#e8a090';
  if(pos < 0.8)  return '#c04828';
  return '#8a1a0a';
}
function dirChar(d) { return {crossup:'↑',crossdown:'↓',up:'↑',down:'↓'}[d]||'—'; }

/* ── 評分區 ── */
function renderScore(score, ticker) {
  const price = parseFloat(ticker.lastPrice||0);
  const open  = parseFloat(ticker.open||price);
  const chg   = open>0 ? (price-open)/open*100 : 0;
  const chgStr= (chg>=0?'+':'')+chg.toFixed(2)+'%';
  const chgCls= chg>=0?'up':'dn';
  document.getElementById('hdrPrice').textContent = price.toLocaleString();
  document.getElementById('hdrChange').innerHTML  = `<span class="${chgCls}">${chgStr}</span>`;

  const sc = score.score;
  let scBg, scColor;
  if(sc>=66){scBg='#d4f0dc';scColor='#1a5c2a';}
  else if(sc>=55){scBg='#eaf7ee';scColor='#2e8c42';}
  else if(sc>=45){scBg='#f1efe8';scColor='#888780';}
  else if(sc>=35){scBg='#fdf2f0';scColor='#c04828';}
  else{scBg='#fce8e4';scColor='#8a1a0a';}

  const bd = score.breakdown;
  function sbVal(v) {
    const cls = v>0?'up':v<0?'dn':'neu';
    return `<span class="${cls}">${v>0?'+':''}${v}</span>`;
  }

  return `<div class="score-card">
    <div class="score-layout">
      <div class="score-circle" style="background:${scBg}">
        <div class="score-num" style="color:${scColor}">${sc}</div>
        <div class="score-dir" style="color:${scColor}">${score.direction}</div>
      </div>
      <div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px">綜合市場評分（四維度）</div>
        <div class="score-breakdown">
          <div class="sb-item"><div class="sb-label">趨勢強度</div><div class="sb-val">${sbVal(bd.trend)}</div></div>
          <div class="sb-item"><div class="sb-label">動能位置</div><div class="sb-val">${sbVal(bd.momentum)}</div></div>
          <div class="sb-item"><div class="sb-label">市場結構</div><div class="sb-val">${sbVal(bd.structure)}</div></div>
          <div class="sb-item"><div class="sb-label">波動度</div><div class="sb-val">${sbVal(bd.volatility)}</div></div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ── 線別建議 ── */
function renderAdvice(adv) {
  const LEVEL_ICON = { short:'🛡️', wave:'🛡️🛡️', big:'🛡️🛡️🛡️' };
  const LEVEL_COLOR = { short:'#185fa5', wave:'#0f4e8a', big:'#08305a' };
  const LEVEL_BG    = { short:'#e6f1fb', wave:'#d0e6f7', big:'#b8d6f2' };

  function escortDetailTags(detail) {
    return (detail||[]).map(e => {
      const icon  = LEVEL_ICON[e.level]  || '🛡️';
      const color = LEVEL_COLOR[e.level] || '#185fa5';
      const bg    = LEVEL_BG[e.level]    || '#e6f1fb';
      return `<span class="res-tag" style="background:${bg};color:${color}">${e.label} ${icon} ${e.level_label}</span>`;
    }).join('');
  }

  // 無觸發也無護航
  if(!adv.has_signal && !adv.has_escort) {
    return `<div class="advice-card">
      <div class="section-title">線別建議 <span>依三貓咪 + PHL 共振結果</span></div>
      <div class="no-signal">
        ⏳ 各時框尚未到位，建議觀望<br>
        <span style="font-size:12px;margin-top:6px;display:block">等待三貓咪 + PHL 低位同步出現</span>
      </div>
    </div>`;
  }

  // 只有護航，無觸發
  if(!adv.has_signal && adv.has_escort) {
    const escortTags = escortDetailTags(adv.escort_detail);
    return `<div class="advice-card">
      <div class="section-title">線別建議 <span>依三貓咪 + PHL 共振結果</span></div>
      <div class="no-signal" style="text-align:left;padding:14px 16px;">
        <div style="font-size:15px;font-weight:600;color:#7a5a10;margin-bottom:6px">⏳ 觀望中，等待進場時機</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:10px">大時框已在低位，等待小時框出現進場訊號</div>
        <div style="font-size:11px;color:#185fa5;font-weight:500;margin-bottom:6px">目前低位護航：</div>
        <div class="res-tags">${escortTags}</div>
      </div>
    </div>`;
  }

  // 有觸發訊號
  const dirColor = adv.direction==='做多'?'#1a5c2a':'#c04828';
  const dirBg    = adv.direction==='做多'?'#d4f0dc':'#fce8e4';
  const triggerTags = (adv.trigger_labels||[]).map(l=>
    `<span class="res-tag tag-active">${l} ⚡ 進場訊號</span>`
  ).join('');
  const escortTags  = escortDetailTags(adv.escort_detail);
  const noSigTags   = (adv.no_signal_labels||[]).map(l=>
    `<span class="res-tag" style="background:#f1efe8;color:#888">${l} —</span>`
  ).join('');

  return `<div class="advice-card">
    <div class="section-title">線別建議 <span>依三貓咪 + PHL 共振結果</span></div>
    <div class="signal-layout">
      <div class="signal-main">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div class="signal-dir" style="color:${dirColor}">${adv.direction}</div>
          <div style="background:${dirBg};color:${dirColor};font-size:14px;font-weight:600;padding:4px 12px;border-radius:6px">${adv.timeframe_type}</div>
        </div>
        <div class="signal-hold" style="font-size:14px">持倉建議：${adv.hold_hours}</div>
        ${adv.escort_note ? `<div style="font-size:12px;color:#185fa5;margin-top:8px;line-height:1.5">📐 ${adv.escort_note}</div>` : ''}
        ${adv.warning ? `<div class="signal-warn">⚠️ ${adv.warning}</div>` : ''}
        ${adv.conflict_warning ? `<div class="signal-warn" style="background:#fff0e0;border-color:#e08000;color:#7a4000;margin-top:6px">🔶 ${adv.conflict_warning}</div>` : ''}
      </div>
      <div class="signal-detail">
        ${triggerTags ? `<div class="res-active">
          <div class="res-label" style="color:#1a5c2a;margin-bottom:5px">進場依據</div>
          <div class="res-tags">${triggerTags}</div>
        </div>` : ''}
        ${escortTags ? `<div style="background:#eef4fc;border:1px solid #b8d0ec;border-radius:6px;padding:10px 12px;">
          <div class="res-label" style="color:#185fa5;margin-bottom:5px">護航確認</div>
          <div class="res-tags">${escortTags}</div>
        </div>` : ''}
        ${noSigTags ? `<div class="res-missing">
          <div class="res-label" style="color:#888;margin-bottom:5px">尚未到位</div>
          <div class="res-tags">${noSigTags}</div>
        </div>` : ''}
      </div>
    </div>
  </div>`;
}

/* ── 共振儀表板 ── */
function renderGroups(groups) {
  const cards = groups.map(g => {
    if(g.error) return `<div class="group-card"><div class="group-label">${g.label}</div><div style="text-align:center;font-size:11px;color:var(--text2);padding:20px 0">錯誤</div></div>`;
    const cls = g.long_trigger?'long-res':g.short_trigger?'short-res':g.long_escort||g.short_escort?'escort-res':'';
    function makePillar(data, name) {
      if(!data) return `<div class="pillar-wrap"><div class="pillar-dir" style="color:var(--neutral)">—</div><div class="pillar" style="background:linear-gradient(to bottom,#c04828,#d8d5ce 50%,#1a5c2a)"></div><div class="pillar-name">${name}</div></div>`;
      const pos=data.pos??0.5, lc=posColor(pos), top=Math.round(pos*100);
      return `<div class="pillar-wrap">
        <div class="pillar-dir" style="color:${lc}">${dirChar(data.direction)}</div>
        <div class="pillar" style="background:linear-gradient(to bottom,#c04828 0%,#e8a090 25%,#d8d5ce 50%,#7dc48a 75%,#1a5c2a 100%)">
          <div class="pillar-line" style="top:${top}%;background:${lc}"></div>
        </div>
        <div class="pillar-name">${name}</div>
      </div>`;
    }
    const tunnelData = g.tunnel?{pos:g.tunnel.pos,direction:g.tunnel.direction}:null;
    const badge = g.long_trigger
      ?`<span class="res-badge rb-long">⚡ 觸發做多</span>`
      :g.short_trigger
        ?`<span class="res-badge rb-short">⚡ 觸發做空</span>`
        :g.long_escort
          ?`<span class="res-badge rb-escort">🛡️ 護航做多</span>`
          :g.short_escort
            ?`<span class="res-badge rb-escort" style="background:#e6f1fb;color:#c04828">🛡️ 護航做空</span>`
            :`<span style="font-size:10px;color:var(--text2)">—</span>`;
    return `<div class="group-card ${cls}">
      <div class="group-label">${g.label}</div>
      <div class="pillars">
        ${makePillar(tunnelData,'貓咪')}
        ${makePillar(g.v1,'V1')}
        ${makePillar(g.v2,'V2')}
      </div>
      <div class="group-badge">${badge}</div>
    </div>`;
  }).join('');
  return `<div class="resonance-card">
    <div class="section-title">時框共振儀表板 <span>柱子越低 = 越深入超賣・箭頭 = 方向</span></div>
    <div class="groups-grid">${cards}</div>
  </div>`;
}

/* ── 指標 ── */
function renderIndicators(indicators) {
  function indBar(val, min, max, label, isOb, isOs, dir) {
    const pos = Math.min(Math.max((val-min)/(max-min),0),1);
    const color = posColor(pos);
    const tag = isOs?`<span class="ind-tag tag-os">超賣</span>`:isOb?`<span class="ind-tag tag-ob">超買</span>`:'';
    const darr = dir==='up'?'↑':'↓';
    return `<div class="ind-row">
      <div class="ind-name">${label} ${tag} <span style="color:${color};font-size:11px">${darr}</span></div>
      <div class="ind-bar-wrap">
        <div class="ind-bar" style="background:linear-gradient(to right,#1a5c2a,#d8d5ce 50%,#c04828)">
          <div class="ind-marker" style="left:${Math.round(pos*100)}%"></div>
        </div>
        <div class="ind-val" style="color:${color}">${val}</div>
      </div>
    </div>`;
  }
  const cards = indicators.map(tf => {
    if(tf.error) return `<div class="ind-tf-card"><div class="ind-tf-label">${tf.label}</div><div style="color:var(--text2);font-size:11px">錯誤</div></div>`;
    const rsi=tf.rsi, macd=tf.macd, kdj=tf.kdj;
    const macdTag=macd?(macd.bullish?`<span class="ind-tag tag-bull">多頭</span>`:`<span class="ind-tag tag-bear">空頭</span>`):'';
    const kdjTag=kdj?(kdj.golden_cross?`<span class="ind-tag tag-bull">金叉</span>`:kdj.dead_cross?`<span class="ind-tag tag-bear">死叉</span>`:''):'';
    return `<div class="ind-tf-card">
      <div class="ind-tf-label">${tf.label}</div>
      ${rsi?indBar(rsi.value,0,100,'RSI',rsi.overbought,rsi.oversold,rsi.direction):''}
      <div class="ind-row">
        <div class="ind-name">MACD ${macdTag}</div>
        <div class="ind-bar-wrap">
          <div class="ind-bar" style="background:linear-gradient(to right,#c04828,#d8d5ce 50%,#1a5c2a)">
            <div class="ind-marker" style="left:${macd?Math.round(macd.pos*100):50}%"></div>
          </div>
          <div class="ind-val" style="color:${macd&&macd.bullish?'#1a5c2a':'#c04828'}">${macd?(macd.histogram>0?'+':'')+macd.histogram.toFixed(4):'—'}</div>
        </div>
      </div>
      ${kdj?`<div class="ind-row">
        <div class="ind-name">KDJ K值 ${kdjTag}</div>
        <div class="ind-bar-wrap">
          <div class="ind-bar" style="background:linear-gradient(to right,#1a5c2a,#d8d5ce 50%,#c04828)">
            <div class="ind-marker" style="left:${Math.round(kdj.pos*100)}%"></div>
          </div>
          <div class="ind-val" style="color:${posColor(kdj.pos)}">${kdj.k}</div>
        </div>
      </div>`:''}
    </div>`;
  }).join('');
  return `<div class="indicators-card">
    <div class="section-title">RSI / MACD / KDJ</div>
    <div class="ind-grid">${cards}</div>
  </div>`;
}

/* ── 其他指標 ── */
function renderOther(funding, oi, ls) {
  const fr=parseFloat(funding.fundingRate||0)*100;
  const frCls=fr<0?'up':fr>0.03?'dn':'neu';
  const frTip=fr<0?'空方付費，有利做多':fr>0.03?'多方過熱，注意風險':'費率正常';
  const lr=parseFloat(ls.longShortRatio||0);
  const lsCls=lr>1.2?'up':lr<0.8?'dn':'neu';
  const oiLast=oi.length>0?parseFloat(oi[oi.length-1]?.sumOpenInterest||0):0;
  const oiFirst=oi.length>0?parseFloat(oi[0]?.sumOpenInterest||0):0;
  const oiChg=oiFirst>0?(oiLast-oiFirst)/oiFirst*100:0;
  const oiCls=oiChg>0?'up':'dn';
  return `<div class="other-card">
    <div class="section-title">資金費率 / OI / 多空比</div>
    <div class="other-grid">
      <div class="ocard"><div class="ocard-label">資金費率</div><div class="ocard-val ${frCls}">${fr.toFixed(4)}%</div><div class="ocard-sub">${frTip}</div></div>
      <div class="ocard"><div class="ocard-label">未平倉合約 24h</div><div class="ocard-val ${oiCls}">${oiChg>=0?'+':''}${oiChg.toFixed(1)}%</div><div class="ocard-sub">${oiLast>0?(oiLast/1e8).toFixed(2)+'億':'—'}</div></div>
      <div class="ocard"><div class="ocard-label">多空比</div><div class="ocard-val ${lsCls}">${lr.toFixed(2)}</div><div class="ocard-sub">${lr>1?'多方佔優':lr<1?'空方佔優':'均衡'}</div></div>
    </div>
  </div>`;
}

/* ── 主載入 ── */
async function load() {
  const sym = document.getElementById('symInput').value.trim().toUpperCase();
  if(!sym) return;
  if(!sym.endsWith('USDT')){alert('請輸入 USDT 計價，如 BTCUSDT');return;}
  currentSym = sym;
  document.getElementById('tvSymLabel').textContent = `${sym} · K線`;
  loadTV(sym, tvTF);
  const btn = document.getElementById('loadBtn');
  btn.disabled=true; btn.textContent='計算中...';
  document.getElementById('content').innerHTML=`<div class="loading-overlay">計算中，請稍候（約 15 秒）...</div>`;
  try {
    const res  = await fetch(`${BITO_API}/analysis?symbol=${sym}`);
    const data = await res.json();
    if(data.code!==0) throw new Error(data.msg||'錯誤');
    document.getElementById('content').innerHTML =
      renderScore(data.score, data.ticker) +
      renderAdvice(data.resonance_advice) +
      renderGroups(data.groups) +
      renderIndicators(data.indicators) +
      renderOther(data.funding, data.oi, data.ls);
    document.getElementById('statusBar').textContent = `最後更新：${new Date().toLocaleTimeString('zh-TW')}`;
  } catch(e) {
    document.getElementById('content').innerHTML=`<div class="loading-overlay">載入失敗：${e.message}</div>`;
  }
  btn.disabled=false; btn.textContent='分析';
}

/* ── 權限 ── */
async function checkAuth() {
  const {data:{session}} = await sb.auth.getSession();
  if(!session){location.href='login.html';return false;}
  const {data:p} = await sb.from('profiles').select('plan').eq('id',session.user.id).single();
  if(!p||p.plan==='free'){
    document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);flex-direction:column;gap:14px">
      <div style="font-size:42px">🔒</div><div style="font-size:16px">此功能需要遊俠以上身份</div>
      <a href="index.html" style="color:var(--accent)">返回首頁</a></div>`;
    return false;
  }
  return true;
}

(async()=>{
  const ok = await checkAuth();
  if(!ok) return;
  loadTV('BTCUSDT', tvTF);
})();
</script>
