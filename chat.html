<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>比特聯盟 · 即時聊天室</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #edd4be; --panel: #f5e8d8; --dark: #1a1008;
  --accent: #8b5e3c; --gold: #d4a843;
  --text: #2a1f14; --muted: #7a5c42; --border: #d4b896;
  --up: #27AE60; --dn: #C0392B; --radius: 12px;
  --shadow: 0 2px 12px rgba(42,31,20,.08);
}
body { background:var(--bg); font-family:-apple-system,'Helvetica Neue','PingFang TC',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

/* Navbar */
.navbar { background:var(--dark); height:56px; display:flex; align-items:center; padding:0 20px; gap:12px; position:sticky; top:0; z-index:100; flex-shrink:0; }
.nav-logo { font-size:18px; font-weight:700; color:var(--gold); }
.nav-spacer { flex:1; }
.nav-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; background:var(--accent); color:#fff; }
.nav-badge.ranger { background:#4a7a6a; }
.nav-badge.master { background:var(--gold); color:#1a1008; }
.btn-back { background:transparent; border:1px solid #444; color:#aaa; padding:5px 14px; border-radius:7px; font-size:13px; text-decoration:none; }
.online-dot { width:8px; height:8px; border-radius:50%; background:#27AE60; display:inline-block; margin-right:4px; animation:pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
.online-count { font-size:12px; color:#7a6050; }

/* 封鎖畫面 */
.locked-screen { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
.locked-box { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:40px 32px; text-align:center; max-width:400px; box-shadow:var(--shadow); }
.locked-icon { font-size:64px; margin-bottom:16px; }
.locked-title { font-size:20px; font-weight:800; color:var(--text); margin-bottom:8px; }
.locked-sub { font-size:14px; color:var(--muted); line-height:1.7; margin-bottom:24px; }
.btn-join { display:inline-block; padding:12px 28px; background:var(--accent); color:#fff; border-radius:10px; font-size:15px; font-weight:700; text-decoration:none; }

/* 聊天主體 */
.chat-layout { flex:1; display:flex; flex-direction:column; max-width:900px; width:100%; margin:0 auto; padding:0 16px 16px; min-height:0; }

/* 訊息列表 */
.messages-wrap { flex:1; overflow-y:auto; padding:16px 0; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }
.messages-wrap::-webkit-scrollbar { width:4px; }
.messages-wrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* 訊息卡 */
.msg-card { display:flex; gap:10px; align-items:flex-start; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.msg-card.mine { flex-direction:row-reverse; }
.msg-avatar { width:40px; height:40px; border-radius:50%; background:var(--dark); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; border:2px solid var(--border); }
.msg-body { max-width:70%; }
.msg-card.mine .msg-body { align-items:flex-end; display:flex; flex-direction:column; }
.msg-meta { display:flex; align-items:center; gap:6px; margin-bottom:4px; flex-wrap:wrap; }
.msg-card.mine .msg-meta { flex-direction:row-reverse; }
.msg-name { font-size:13px; font-weight:700; color:var(--text); }
.msg-rank { font-size:10px; font-weight:700; padding:2px 7px; border-radius:8px; }
.rank-miner   { background:#e8e0d8; color:#7a5c42; }
.rank-knight  { background:#dce8f0; color:#2a5a7a; }
.rank-wargod  { background:#e8f0dc; color:#3a6a2a; }
.rank-wizard  { background:#e8dcf0; color:#5a2a7a; }
.rank-king    { background:#f0e8dc; color:#8a5a2a; }
.rank-elder   { background:#f0dcdc; color:#7a2a2a; }
.rank-master  { background:#f0e0c8; color:#8a4a00; }
.rank-supreme { background:linear-gradient(135deg,#d4a843,#b8860b); color:#fff; }
.rank-ranger  { background:#d0e8d8; color:#1a5c30; }
.rank-master-title { background:linear-gradient(135deg,#8b5e3c,#5a3a1a); color:#fff; }
.rank-admin   { background:linear-gradient(135deg,#1a1008,#3a2010); color:var(--gold); }
.msg-time { font-size:10px; color:var(--muted); }
.msg-bubble {
  background:var(--panel); border:1px solid var(--border);
  border-radius:12px 12px 12px 2px;
  padding:10px 14px; font-size:14px; line-height:1.6; color:var(--text);
  word-break:break-word; box-shadow:var(--shadow);
}
.msg-card.mine .msg-bubble {
  background:var(--dark); color:#f5e8d8;
  border-color:transparent;
  border-radius:12px 12px 2px 12px;
}
.msg-img { max-width:240px; border-radius:8px; margin-top:6px; cursor:pointer; border:1px solid var(--border); }
.msg-delete { font-size:11px; color:var(--muted); cursor:pointer; opacity:0; transition:opacity .2s; background:none; border:none; padding:2px 6px; }
.msg-card:hover .msg-delete { opacity:1; }

/* 日期分隔線 */
.date-divider { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:11px; margin:4px 0; }
.date-divider::before,.date-divider::after { content:''; flex:1; height:1px; background:var(--border); }

/* 系統訊息 */
.sys-msg { text-align:center; font-size:12px; color:var(--muted); padding:4px 0; }

/* 輸入列 */
.input-bar {
  background:var(--panel); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px 14px;
  box-shadow:var(--shadow); flex-shrink:0;
}
.input-row { display:flex; gap:10px; align-items:flex-end; }
.input-box {
  flex:1; padding:10px 14px; background:var(--bg);
  border:1.5px solid var(--border); border-radius:10px;
  font-size:14px; font-family:inherit; color:var(--text);
  resize:none; outline:none; max-height:120px; min-height:42px;
  transition:border-color .2s; line-height:1.5;
}
.input-box:focus { border-color:var(--accent); }
.btn-send {
  padding:10px 20px; background:var(--accent); color:#fff;
  border:none; border-radius:10px; font-size:14px; font-weight:700;
  cursor:pointer; flex-shrink:0; transition:opacity .2s;
  height:42px;
}
.btn-send:hover { opacity:.88; }
.btn-send:disabled { opacity:.5; cursor:default; }
.btn-img {
  padding:10px 12px; background:transparent;
  border:1.5px solid var(--border); border-radius:10px;
  cursor:pointer; font-size:16px; height:42px; flex-shrink:0;
  transition:border-color .2s;
}
.btn-img:hover { border-color:var(--accent); }
.img-preview-wrap { margin-bottom:8px; display:none; }
.img-preview-wrap img { height:60px; border-radius:6px; border:1px solid var(--border); }
.img-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px; margin-left:6px; }
.char-count { font-size:11px; color:var(--muted); text-align:right; margin-top:4px; }

/* 圖片燈箱 */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:9999; align-items:center; justify-content:center; cursor:zoom-out; }
.lightbox.open { display:flex; }
.lightbox img { max-width:92vw; max-height:92vh; border-radius:8px; }

/* 載入更多 */
.load-more-btn { text-align:center; padding:8px; }
.load-more-btn button { background:transparent; border:1px solid var(--border); color:var(--muted); padding:6px 16px; border-radius:20px; font-size:12px; cursor:pointer; }

@media(max-width:600px){ .msg-body{max-width:85%;} .btn-send{padding:10px 14px;} }
</style>
</head>
<body>

<nav class="navbar">
  <span class="nav-logo">⚔️ 比特聯盟</span>
  <span class="online-dot"></span>
  <span class="online-count" id="onlineCount">聊天室</span>
  <div class="nav-spacer"></div>
  <span class="nav-badge" id="navBadge">載入中</span>
  <a href="index.html" class="btn-back">← 首頁</a>
</nav>

<!-- 封鎖畫面 -->
<div class="locked-screen" id="lockedScreen" style="display:none;">
  <div class="locked-box">
    <div class="locked-icon">🔒</div>
    <div class="locked-title">需要會員資格才能進入</div>
    <div class="locked-sub">
      即時聊天室是比特聯盟會員專屬空間。<br>
      在這裡，各等級交易者分享即時戰績、市場觀點，<br>
      你的 <strong>Bitunix VIP 頭銜</strong>將顯示在每則訊息旁。
    </div>
    <a href="profile.html" class="btn-join">🎯 申請會員身份</a>
  </div>
</div>

<!-- 聊天主體 -->
<div class="chat-layout" id="chatLayout" style="display:none;">
  <div class="load-more-btn" id="loadMoreBtn" style="display:none;">
    <button onclick="loadMore()">載入更多訊息</button>
  </div>
  <div class="messages-wrap" id="messagesWrap"></div>
  <div class="input-bar">
    <div class="img-preview-wrap" id="imgPreviewWrap">
      <img id="imgPreview" src="">
      <button class="img-remove" onclick="clearImg()">✕ 移除圖片</button>
    </div>
    <div class="input-row">
      <button class="btn-img" onclick="document.getElementById('imgInput').click()" title="上傳圖片">📷</button>
      <textarea class="input-box" id="msgInput" placeholder="輸入訊息，Enter 送出，Shift+Enter 換行…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMsg()">送出</button>
    </div>
    <div class="char-count" id="charCount">0 / 500</div>
    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImgSelect(this)">
  </div>
</div>

<!-- 圖片燈箱 -->
<div class="lightbox" id="lightbox" onclick="document.getElementById('lightbox').classList.remove('open')">
  <img id="lightboxImg" src="">
</div>

<script>
const SUPABASE_URL  = 'https://kldumnxdlgovaxtiszyn.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsZHVtbnhkbGdvdmF4dGlzenluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMjIyNDgsImV4cCI6MjA5MzY5ODI0OH0.P_anfYpSV2tgCPIQ7uZDVBjUFY3UhfEXk9u3XjlzBHI';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const RANK_MAP = {
  miner:'⛏️ 礦工', knight:'⚔️ 騎士', wargod:'⚡ 戰神',
  wizard:'🔮 術士', king:'👑 天王', elder:'🏯 長老',
  master:'🐉 宗師', supreme:'✨ 至尊'
};
const RANK_CLASS = {
  miner:'rank-miner', knight:'rank-knight', wargod:'rank-wargod',
  wizard:'rank-wizard', king:'rank-king', elder:'rank-elder',
  master:'rank-master', supreme:'rank-supreme'
};

let currentUser = null;
let currentProfile = null;
let currentRank = null;
let canSend = false;
let isMasterOrAdmin = false;
let selectedFile = null;
let oldestMsgId = null;
let hasMore = false;
const PAGE_SIZE = 40;
const profileCache = {};

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  currentUser = session.user;

  // 取 profile
  const { data: profile } = await sb.from('profiles')
    .select('plan, is_direct_client, display_name, email')
    .eq('id', currentUser.id).single();
  currentProfile = profile || {};

  // 取 rank
  const { data: rank } = await sb.from('member_ranks')
    .select('rank').eq('user_id', currentUser.id).single();
  currentRank = rank?.rank || null;

  const plan = currentProfile.plan || 'free';
  const isDirect = currentProfile.is_direct_client;
  isMasterOrAdmin = ['master','admin'].includes(plan);

  // navbar badge
  const b = document.getElementById('navBadge');
  if (plan === 'admin')       { b.textContent = '👑 系統管理員'; b.className = 'nav-badge master'; }
  else if (plan === 'master') { b.textContent = '⚔️ 盟主';      b.className = 'nav-badge master'; }
  else if (plan === 'ranger') { b.textContent = '🗡️ 遊俠';      b.className = 'nav-badge ranger'; }
  else if (isDirect || plan === 'direct') { b.textContent = '⚔️ 會員'; b.className = 'nav-badge'; }
  else { b.textContent = '布衣'; b.className = 'nav-badge'; }

  // 權限判斷
  const allowed = isDirect || ['ranger','direct','master','admin'].includes(plan);
  if (!allowed) {
    document.getElementById('lockedScreen').style.display = 'flex';
    return;
  }

  canSend = true;
  document.getElementById('chatLayout').style.display = 'flex';
  document.getElementById('chatLayout').style.flexDirection = 'column';

  await loadMessages();
  subscribeRealtime();
}

// ── 載入訊息 ──
async function loadMessages(before = null) {
  let query = sb.from('messages')
    .select('id, user_id, content, image_path, created_at')
    .eq('platform', 'bitoalliance')
    .order('created_at', { ascending: false })
    .limit(PAGE_SIZE + 1);
  if (before) query = query.lt('created_at', before);

  const { data } = await query;
  if (!data) return;

  hasMore = data.length > PAGE_SIZE;
  const msgs = hasMore ? data.slice(0, PAGE_SIZE) : data;
  msgs.reverse(); // 舊→新

  if (before) {
    // 載入更多：插入到最上方
    const wrap = document.getElementById('messagesWrap');
    const oldHeight = wrap.scrollHeight;
    await prependMessages(msgs);
    wrap.scrollTop = wrap.scrollHeight - oldHeight;
  } else {
    await renderMessages(msgs);
    scrollToBottom();
  }

  if (msgs.length > 0) oldestMsgId = msgs[0].created_at;
  document.getElementById('loadMoreBtn').style.display = hasMore ? 'block' : 'none';
}

async function loadMore() {
  if (oldestMsgId) await loadMessages(oldestMsgId);
}

// ── 取用戶資料 ──
async function getProfile(userId) {
  if (profileCache[userId]) return profileCache[userId];
  const { data: p } = await sb.from('profiles')
    .select('display_name, plan, is_direct_client').eq('id', userId).single();
  const { data: r } = await sb.from('member_ranks')
    .select('rank').eq('user_id', userId).single();
  const result = { ...p, rank: r?.rank || null };
  profileCache[userId] = result;
  return result;
}

// ── 渲染訊息 ──
async function renderMessages(msgs) {
  const wrap = document.getElementById('messagesWrap');
  wrap.innerHTML = '';
  let lastDate = '';
  for (const msg of msgs) {
    const dateStr = new Date(msg.created_at).toLocaleDateString('zh-TW', {month:'long',day:'numeric'});
    if (dateStr !== lastDate) {
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.textContent = dateStr;
      wrap.appendChild(div);
      lastDate = dateStr;
    }
    const el = await buildMsgEl(msg);
    wrap.appendChild(el);
  }
}

async function prependMessages(msgs) {
  const wrap = document.getElementById('messagesWrap');
  const firstChild = wrap.firstChild;
  let lastDate = '';
  for (const msg of msgs) {
    const dateStr = new Date(msg.created_at).toLocaleDateString('zh-TW', {month:'long',day:'numeric'});
    if (dateStr !== lastDate) {
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.textContent = dateStr;
      wrap.insertBefore(div, firstChild);
      lastDate = dateStr;
    }
    const el = await buildMsgEl(msg);
    wrap.insertBefore(el, firstChild);
  }
}

async function buildMsgEl(msg) {
  const profile = await getProfile(msg.user_id);
  const isMine = msg.user_id === currentUser.id;
  const plan = profile?.plan || 'free';
  const isDirect = profile?.is_direct_client;
  const rank = profile?.rank;
  const name = profile?.display_name || '比特聯盟成員';

  // 頭銜
  let rankHtml = '';
  if (['admin'].includes(plan)) {
    rankHtml = `<span class="msg-rank rank-admin">👑 系統管理員</span>`;
  } else if (plan === 'master') {
    rankHtml = `<span class="msg-rank rank-master-title">⚔️ 盟主</span>`;
  } else if (plan === 'ranger') {
    rankHtml = `<span class="msg-rank rank-ranger">🗡️ 遊俠</span>`;
  } else if (rank && RANK_MAP[rank]) {
    rankHtml = `<span class="msg-rank ${RANK_CLASS[rank]}">${RANK_MAP[rank]}</span>`;
  }

  // 頭像 emoji
  const avatarEmoji = plan==='admin'?'👑':plan==='master'?'⚔️':plan==='ranger'?'🗡️':rank?RANK_MAP[rank]?.split(' ')[0]||'⛏️':'⛏️';

  const time = new Date(msg.created_at).toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'});

  const deleteBtn = (isMasterOrAdmin || isMine)
    ? `<button class="msg-delete" onclick="deleteMsg('${msg.id}')">🗑</button>` : '';

  const imgHtml = msg.image_path
    ? `<img class="msg-img" src="${getImgUrl(msg.image_path)}" onclick="openLightbox(this.src)" alt="圖片">`
    : '';

  const div = document.createElement('div');
  div.className = `msg-card ${isMine?'mine':''}`;
  div.dataset.msgId = msg.id;
  div.innerHTML = `
    <div class="msg-avatar">${avatarEmoji}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-name">${esc(name)}</span>
        ${rankHtml}
        <span class="msg-time">${time}</span>
        ${deleteBtn}
      </div>
      ${msg.content ? `<div class="msg-bubble">${esc(msg.content)}</div>` : ''}
      ${imgHtml}
    </div>`;
  return div;
}

function getImgUrl(path) {
  return `${SUPABASE_URL}/storage/v1/object/public/chat-images/${path}`;
}

// ── 即時訂閱 ──
function subscribeRealtime() {
  sb.channel('chat-messages-bitoalliance')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, async payload => {
      const msg = payload.new;
      if (msg.platform !== 'bitoalliance') return; // 過濾其他平台
      if (msg.user_id === currentUser.id) return; // 自己的訊息已即時顯示
      const wrap = document.getElementById('messagesWrap');
      const el = await buildMsgEl(msg);
      wrap.appendChild(el);
      scrollToBottom();
    })
    .on('postgres_changes', { event:'DELETE', schema:'public', table:'messages' }, payload => {
      const el = document.querySelector(`[data-msg-id="${payload.old.id}"]`);
      if (el) el.remove();
    })
    .subscribe();
}

// ── 送出訊息 ──
async function sendMsg() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content && !selectedFile) return;
  if (content.length > 500) { alert('訊息不能超過 500 字'); return; }

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  let image_path = null;

  // 上傳圖片
  if (selectedFile) {
    const ext = selectedFile.name.split('.').pop();
    const path = `${currentUser.id}/${Date.now()}.${ext}`;
    const { error: upErr } = await sb.storage.from('chat-images').upload(path, selectedFile);
    if (!upErr) image_path = path;
    clearImg();
  }

  // 先樂觀渲染
  const tempMsg = {
    id: 'temp-' + Date.now(),
    user_id: currentUser.id,
    content,
    image_path,
    created_at: new Date().toISOString(),
  };
  const wrap = document.getElementById('messagesWrap');
  const el = await buildMsgEl(tempMsg);
  wrap.appendChild(el);
  scrollToBottom();

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('charCount').textContent = '0 / 500';

  // 寫入 DB
  const { error } = await sb.from('messages').insert({
    user_id: currentUser.id,
    content: content || null,
    image_path,
    platform: 'bitoalliance',
  });

  btn.disabled = false;
  if (error) {
    el.remove();
    alert('送出失敗：' + error.message);
  }
}

// ── 刪除訊息 ──
async function deleteMsg(id) {
  if (!confirm('確定刪除這則訊息？')) return;
  await sb.from('messages').delete().eq('id', id);
  const el = document.querySelector(`[data-msg-id="${id}"]`);
  if (el) el.remove();
}

// ── 圖片 ──
function handleImgSelect(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5*1024*1024) { alert('圖片不能超過 5MB'); return; }
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('imgPreview').src = e.target.result;
    document.getElementById('imgPreviewWrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function clearImg() {
  selectedFile = null;
  document.getElementById('imgInput').value = '';
  document.getElementById('imgPreviewWrap').style.display = 'none';
  document.getElementById('imgPreview').src = '';
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

// ── 輸入框 ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('charCount').textContent = `${el.value.length} / 500`;
}
function scrollToBottom() {
  const wrap = document.getElementById('messagesWrap');
  wrap.scrollTop = wrap.scrollHeight;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
